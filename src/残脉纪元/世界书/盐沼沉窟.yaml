---
盐沼沉窟:
  定位: 鸣野城南约一日行程的中级遗迹, 一片织脉文明的盐灶聚落沉入盐沼, 半淹在卤水与红树林之间
  生态: 滨海咸水沼泽, 终年蒸着湿热的咸雾; 沉窟的砖灶长满盐霜与脉纹苔, 卤水里漂着发光的异化盐藻
  结构:
    外围: 半塌的盐灶与晒台, 泥路仅干涸时段可涉
    主体: 沉入卤水的灶神祠与贮盐窟, 多需涉水或蹚泥探索
    深处: 一座仍能运转的"脉灶"——织脉文明的蓄脉器, 被盐与残脉共同浸养至今
  危险: 卤水腐蚀装备; 盐鳖兽与循残脉聚集的盐鳃兽会伏击涉水者; 泥底有脉纹蛭; 长时间浸泡使人乏力且皮肤泛盐, 易引残脉侵蚀
  奖励: 盐渍遗物保存极佳, 脉纹拓片清晰; 可采异化盐藻与盐霜药; 脉灶附近残脉浓而不烈, 是中阶导脉师的练绩宝地
  感官质地: 涉卤、蹚泥、攀爬盐灶令汗水、盐渍、皮肤外露成为常态; 咸雾里气息浓重, 汗味与海腥相混; 蹚过卤水后须在野泉或城内反复冲洗与导脉, 净化场景高频
  难度: 中级, 偏环境折磨; 需耐腐蚀装备与导脉师随行
  一句印象: 半沉在咸雾里的旧盐灶, 连呼吸都发咸
