---
悬空浮港:
  定位: 鸣野城东北方约两日路程的险峻峡谷峭壁，织脉文明时期用于停靠空中飞梭的浮空港口遗址。
  生态: 峡谷狂风烈烈，日照强烈且干燥。石台上生长着耐旱的金色“风啸草”与吸附在岩壁上的结晶脉苔，空气中几乎没有湿热的水汽，而是干燥的石粉与烈风的呼啸。
  结构:
    天梯岩壁: 垂直高度近千米的悬崖峭壁，残留着锈蚀的古代悬空铁道与攀爬索道。
    浮空锚台: 浮动于峡谷中间的几座巨大浮石平台，通过粗大的脉纹锁链与两侧峭壁相连，随风缓缓摇晃。
    飞梭控制枢: 位于最高处断崖上的石殿，内有失灵的古代导航仪与大量损坏的控制台。
  危险: 强劲而莫测的峡谷横风，随时可能把人吹落深渊；平台底部的浮空脉纹处于失控状态，靠近会导致局部重力异常（突然失重或超重）；岩缝中栖息着异化翼手兽。
  奖励: 能够采集到珍贵的“浮石脉晶”（制作浮空或减轻重量遗物的核心材料）；控制枢内偶有关于古代航空与地理的残缺典籍。
  感官质地: 极度干燥的峡谷烈风吹裂嘴唇，手掌与岩石、锁链剧烈摩擦，攀爬时体力极速消耗带来的肌肉酸痛与急促喘息；在高空悬崖上低头俯瞰时的晕眩感，风中夹杂着干涸泥土和结晶体发出的冰冷脉味。
  难度: 高级，需要出色的攀爬技术与防风准备。
  一句印象: 风在千米高空的巨链上拉出尖啸，让人双腿发软。
