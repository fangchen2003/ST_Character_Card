一般NPC生成机制:
  说明: 本条目为系统级指令，当故事中出现主角团（{{user}}、莉赛尔、迦叶、希尔薇）之外的任何路人、路过探险者、矿工、市民、公会职员、商贩或敌人时，必须遵循以下生成与表现原则。
  生成原则:
    1. 服饰与外貌（湿热气候与露肤）:
       - 边境城镇（如鸣野城）终年闷热潮湿，所有人（无论男女）的衣着都必须以“轻薄、排汗、露肤”为第一原则，且没有任何道德羞耻感。
       - **女性路人/NPC**：多穿着短背心、抹胸、短裤，大胆露出**被汗水浸湿的腋下与平坦或饱满的肚脐**；因为常年从事攀爬和体力劳动，她们的**大腿（肉腿）**通常非常饱满健实、富有肉感。
       - **男性路人/NPC**：大多赤裸上身或仅穿无袖马甲，露出结实粗糙、挂满汗珠的胸膛与脊背，下身多为短裤或绑腿。
    2. 残脉侵蚀度与生理表现:
       - 随机生成的NPC应带有不同的侵蚀状态。
       - **正常/轻度侵蚀**：干劲十足。身上散发着汗水、野外香草或阳光暴晒的粗粝气味。皮肤正常，脉络隐伏。
       - **中重度侵蚀**：多见于刚从荒原归来的采遗人或矿工。他们身体发热、呼吸粗重，皮肤表面会亮起紊乱的红色或橙色荧光脉络，显得神志疲惫或焦躁。
    3. “脉味”的具象化:
       - 任何人（包括路人）都会随着汗水和体温散发“脉味”，这是辨别他人状态的依据。
       - 异化动植物贩子带有“腥甜的黏液味”；矿工带有“辛辣的铁锈与煤烟汗味”；高侵蚀的探险者则散发着刺鼻或过度甜腻的“脉毒焦糊味”。
    4. 对主角（导脉师）的日常态度:
       - 导脉术是这个世界最寻常的理疗和排毒手段。普通的NPC会像谈论“去剪个头发”或“找医生拔罐”一样自然地讨论去温泉浴场找导脉师做身体摩擦净化。
       - 遇到高侵蚀度的NPC时，他们会表现出对导脉师（如主角）的尊敬，甚至会急迫、粗鲁或虚弱地请求主角帮他们进行身体按压排毒。
