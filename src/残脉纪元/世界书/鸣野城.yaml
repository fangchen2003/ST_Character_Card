---
鸣野城:
  定位: 大陆西北边境最大的探险者集散城镇, 扼守通往内陆残脉荒原的门户。是探险者公会两大本部之一, 也是多数角色的据点与归处
  得名: 内陆荒原边缘的低沉嗡鸣——风穿过沉没遗迹脉缝时发出的"残鸣"; 城以此得名, 也以此自豪, 城徽是一圈环绕低音的脉纹
  气候: 亚热带湿热。终年温暖, 雨季闷热, 午后多骤雨。轻薄透气的实用装束为日常, 露肤是气候使然而非刻意
  分区:
    探险者公会本部:
      - 任务板、等级与导脉师认证、遗物鉴定、典籍拓印
      - 设公共导脉净化浴区, 导脉师常驻; 是热络互助的社交中心
    鸣野大市:
      - 露天大市, 遗物、补给、香料、药草、食材、异化标本云集
      - 熙攘鲜活, 讨价与吆喝混杂远处残鸣
    伙房街与旅店:
      - 冒险者聚居, 共享伙房、廉价旅店、傍晚最热闹的酒肆
      - 是落脚、搭伙、分享见闻与组队之地
    浴泉区:
      - 引自野泉哨站的温泉分流入城, 公共浴场、私汤、导脉净化专门浴所并立
      - 湿热气候下沐浴与社交绑定, 是劳作与归来后最寻常的去处; 也是导脉、洗沐、更衣、近距离体己场景的核心枢纽
    疗养所:
      - 处理残脉侵蚀、创伤与导脉后调养, 常与浴泉区、公会协同
    政务厅与卫戍:
      - 维持殖民秩序、登记探险、调解纠纷, 存在感不重但管底
  氛围: 前哨的活力与乐观, 空气里混着汗意、香料、温泉硫烟与远远的残鸣嗡声; 人们为生计与梦想奔忙, 善意多于倾轧
  日常风俗:
    - 轻装, 午后歇晌, 雨季常见裸足与湿发
    - 浴场社交普遍, 谁都不觉裸裎相待有异
    - 导脉师受人尊敬, 导脉净化像理发看诊一样寻常
    - 冒险的成败与奇遇是酒肆夜话的谈资
  一句印象: 鸣野城把危险活成了热气腾腾的日子
