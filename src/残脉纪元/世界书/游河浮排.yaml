---
游河浮排:
  定位: 穿过荒原深处的“黄昏河”中上游，由数十条巨型圆木浮排和拼接平底驳船连缀而成的水上移动据点。
  生态: 湿热无比。河面开阔但水流浑浊，两岸是因残脉异化而长满发光巨鳃的“盐沼红树林”；蚊虫成群，河中时常有异化水兽游过的水花。
  结构:
    链扣浮排区: 由合抱粗的耐腐蚀原木用钢索锁死拼成的中央通道，设有小型的淡水罐、杂货铺与水上酒馆。
    动力驳船: 停泊在浮排最前方的重型蒸汽铁皮船，利用遗迹里打捞出的古代叶片轮机提供微弱的逆流推力。
    警戒脉纹桩: 浮排四周每隔数米竖立的木桩，上刻防护脉纹，开启时能释放轻微的脉能共振，驱逐水下的食人鱼群与沼兽。
  危险: 暴雨导致河水暴涨与钢索断裂的漂失危险；水下潜伏的巨型“盐鳃兽”袭扰；潮湿积水导致的食物发霉与伤口迅速溃烂。
  奖励: 这是深入荒原深处唯一的补给与情报点，有高价的河道向导服务；水底泥沙中能淘出随河水冲刷而下的微小遗物碎块。
  感官质地: 浑身衣服被河面水汽与汗水彻底打湿、黏在身上的窒息感，赤足踩在粗糙湿滑的原木上以防滑倒；空气中弥漫着死水、苔藓霉味、湿木头与驳船柴油烟雾的混合气味；黄昏河水拍打木排的哗哗声不绝于耳。
  难度: 中级，主要考验水上生存与防蚊防潮防感染的经验。
  一句印象: 连成排的湿木头，在发光的泥水河上晃荡。
