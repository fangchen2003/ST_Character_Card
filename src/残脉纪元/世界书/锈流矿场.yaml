---
锈流矿场:
  定位: 鸣野城外围西南山谷中的大型脉铁开采区，是前哨城镇的主要重工业与金属原材料来源。
  生态: 极其燥热、蒸汽弥漫。谷底流淌着带有橘黄色铁锈与残脉废液的溪流，四处是简易的木质脚手架、轰鸣的蒸汽碎石机和散发着刺鼻气味的矿石冶炼炉。
  结构:
    露天采掘坑: 呈阶梯状下凹的百米巨坑，岩壁上镶嵌着暗红色的脉铁矿脉，在挖掘时会溅射火花。
    熔炼铁棚: 简易的波纹铁皮大棚，数座炉火通红的熔炉日夜工作，铁水流淌，散发出灼人的热浪。
    矿工棚区: 矿工们低矮潮湿的集体宿舍，常设有一处极为简陋、热气腾腾的公共导脉药浴桶。
  危险: 碎石崩塌与铁水飞溅的烫伤；矿坑深处积聚的残脉高浓缩毒气；由于高强度体力劳动与金属残脉粉尘吸入，矿工极易罹患急性残脉侵蚀症（矿肺）。
  奖励: 赚取矿场商会发布的丰厚护卫与采矿佣金；导脉师在此为矿工排毒能极快累积实战经验和声望；容易获得优质的粗制脉铁锭。
  感官质地: 混杂着汗水与煤灰的煤烟黏在赤裸的脊背上，热浪蒸腾导致口干舌燥、极度脱水；铁锤敲击与蒸汽机的刺耳轰鸣震动耳膜；空气里充满着铁锈的腥气、熔融金属的焦味与浓烈的脉能蒸汽汗味。
  难度: 低级（矿场周边）至中级（深坑矿洞），主要是恶劣工作环境对体能的考验。
  一句印象: 热浪与金属铁锈里，混着矿工沉重的喘息。
