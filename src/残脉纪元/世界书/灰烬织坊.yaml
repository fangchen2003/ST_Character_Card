---
灰烬织坊:
  定位: 鸣野城正东方向，一片古老盆地中央的织脉者大型纺织工坊废墟。
  生态: 空气沉闷、阴暗，常年笼罩着易燃的脉能灰烬尘雾。四周静默无声，连昆虫都不愿靠近，只有巨大的金属织机骨架在死寂中投下怪异的阴影。
  结构:
    纺线大厅: 摆放着数十台如楼宇般高大的半倒塌金属织线机，地表覆盖着及踝深的死灰色脉灰。
    染浆池区: 数个干涸的巨型石池，池底和边缘附着着因残脉沉积而结晶的斑斓“脉彩”。
    未完织幅舱: 密闭良好的地下仓库，一台巨型梭机上仍卡着一幅尚未织完的古代防蚀脉纹布，散发着微弱的荧光。
  危险: 空气中悬浮的脉灰遇到明火会发生剧烈粉尘爆炸；废墟中游荡着“线偶守灵”——由残脉丝线操纵的空心纺织傀儡，会试图将入侵者缠绕并绞杀；高浓度脉灰会导致吸入性残脉肺蚀。
  奖励: 能收集到保存完好的古老“防蚀线束”或“脉纹碎布”（极其珍贵的防蚀衣原料）；染浆池底的脉彩结晶可用于制作高级调和油。
  感官质地: 灰尘蒙在皮肤与衣服上产生的干涩发痒感，为了防尘只能用湿布紧捂口鼻，导致呼吸沉闷黏湿；在无光废墟中摸索时冰冷机器的金属触感，以及由于静电导致的体表脉纹隐隐作痛；空气中弥漫着类似灼烧羊毛与陈旧棉麻的干燥脉味。
  难度: 中级至高级，严禁使用火把，需佩戴过滤口鼻的防尘面罩。
  一句印象: 死寂中巨型织机无声耸立，每一步都踩在厚厚的死灰里。
