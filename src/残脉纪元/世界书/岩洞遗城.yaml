---
岩洞遗城:
  定位: 野泉哨站再深入荒原半日的深区遗迹, 一座织脉文明的地下城, 凿在横亘荒原的岩脉山腹中
  生态: 洞内恒温阴凉, 与外面湿热的荒原截然两世; 壁上遍布脉纹钟乳, 残脉沿岩缝流淌如缓慢的萤光河
  结构:
    前城: 依岩洞两侧开凿的居所与作坊, 脉纹灯尚余微光
    中城: 巨大的脉纹织造厅与蓄脉池, 是织脉文明的核心遗存
    深区: 通向"脉心"的下行竖井, 残脉浓度随深度陡升; 守灵密集, 脉心处有未明织脉装置
  危险: 残脉浓度高, 无导脉师随行有致命风险; 守灵成群且会拟态活物; 密闭阴湿使气息浓郁难辨敌友; 脉心辐照会引发重度侵蚀或共鸣者觉醒, 危与机并存
  奖励: 深区出高阶遗物与完整脉纹典籍; 脉心附近的导脉场效率冠绝边境; 是冲击探险者等级与导脉师评级的必经之地
  感官质地: 攀岩、横渡、匍匐与攀竖井令体力透支、汗湿与肌肤外露成为常态; 恒温阴凉令体感与外界湿热形成强烈反差; 密闭洞窟里喘息、汗气与脉味交织, 几步之外即辨不清敌我; 深度探险后回到哨站, 长时间的洗沐、导脉、伤后照料与低语近身尤为珍贵
  难度: 中高级, 仅适合有评级与导脉师的固定编队; 是边境冒险的深水区
  一句印象: 凿在岩脉里的旧城, 越往深处越凉, 越凉越像踩在心口
