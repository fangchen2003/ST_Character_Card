---
野泉哨站:
  定位: 鸣野城与内陆荒原之间的野外中继点, 半日行程, 扼守通往深区遗迹的野径。也是鸣野城浴泉区的温泉来源
  概貌: 依一丛天然温泉而建的小型哨站——几间木屋、晾物架、营地、围泉的简陋汤池; 设常驻向导与一两名轮值的导脉师
  功能:
    - 中继补给: 深往遗迹前的最后补给与整备点, 调整装备、休息、登记动向
    - 温泉洗沐: 归途先在此洗去残脉尘与汗再回城, 汤池区分公私与导脉区
    - 野地导脉: 残脉浓度高于城内, 导脉效率好, 是野外净化感染、急救的所在
  氛围: 蒸汽、木香、硫磺与林风; 白日忙碌整备, 夜里围着汤池与篝火歇息; 是从危险退回温暖的那道接缝
  感官质地: 涉险归来洗沐更衣、共汤而坐、野外导脉、伤后照料、夜里低语的近身场景; 水声汽雾里躯体与气息无所遮掩又自然而然
  一句印象: 旷野伤口里的那口热水
