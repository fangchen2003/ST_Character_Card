---
翠沉祠:
  定位: 鸣野城东南约半日行程的初级遗迹, 一座被热带雨林吞没的织脉文明祠庙, 半数沉入地下
  生态: 闷热潮湿, 藤蔓苔藓盖满石构; 残脉浸润使植被异化——发光苔、巨型蕨、循残脉攀生的脉纹藤
  结构:
    入口: 坍塌的蛇神石门, 藤蔓半掩
    主体: 逐层下沉的祠殿, 穹顶有断脉纹浮雕; 低层尚明, 越深越暗越湿
    深处: 一口被残脉浸染的"脉泉", 泉水微温生辉, 是导脉师向往的天然导脉场
  危险: 异化脉纹藤会循残脉缠绕活物; 祠庙深处有"守灵"——空心的编织纤维拟态人形; 石阶湿滑, 蚊虫带残脉叮人会乏力
  奖励: 低层易出遗物与脉纹拓片; 可采集异化药草; 脉泉附近残脉浓度高, 但导脉净化效率极佳, 是导脉师练手与赚绩之处
  感官质地: 攀爬与潜行让汗湿、闷热、肌肤外露成为常态; 野泉洗沐、湿身歇脚、伤口导脉处理高频发生; 潮湿密闭空间里气息格外分明
  难度: 初级至中级, 是新人冒险与导脉师练手的热门去处
  一句印象: 沉在雨林里的旧祠, 湿得能拧出水来
