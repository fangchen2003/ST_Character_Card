---
变量更新规则:
  主角:
    体力:
      type: number
      range: 0~100
      check:
        - 休息时自然恢复。进行剧烈运动、高强度排毒净化、战斗或探索遗迹时消耗 (-10~-30)
    脉能负荷:
      type: number
      range: 0~100
      check:
        - 替女角色进行深度脉毒净化（尤其是涉及敏感部位的高潮排毒）时大幅上升 (+10~+40)
        - 休息、服用特定药剂、或在特定地点（如翠沉祠温泉）修养时下降 (-20~-50)
    理智值:
      type: number
      range: 0~100
      check:
        - 处于高浓度催情气味环境、近距离接触女角色满是汗水的娇躯、或被女角色的发情姿态诱惑时下降 (-5~-20)
        - 远离诱惑环境或进行冷静冥想时缓慢恢复
    情欲值:
      type: number
      range: 0~100
      check:
        - 与女角色进行亲密的肢体接触（如抚摸肉腿、亲吻肚脐、嗅闻腋下）或感受到女角色高潮痉挛时显著上升 (+5~+25)
    导脉技巧:
      type: number
      range: 0~100
      check:
        - 成功引导女角色在排毒过程中达到极乐高潮、或精准刺激敏感部位时获得经验并小幅上升 (+1~+5)
    资金:
      type: number
      check:
        - 探索采遗、完成委托后增加，购买补给、服饰或特殊道具时减少
    物品栏:
      type: |-
        {
          [物品名: string]: {
            描述: string;
            数量?: number;
          }
        }
      check:
        - 获取、消耗、赠送物品时更新，数量归零时彻底移除该条目
 莉赛尔: &Heroine
   好感度:
     type: number
     range: 0~100
     check:
       - 根据与主角的互动、肢体接触的舒适度、以及在排毒过程中产生的身心依赖度动态调整 ±(1~5)
    对主角态度:
      value: 女角色当前对主角的具体态度、看法与情感姿态
      check:
        - 随好感度变化、排毒互动中的身心体验、以及剧情发展动态更新
        - 好感度极低时偏向警惕或敷衍；好感度中等时为信任与依赖；好感度极高时可能产生独占欲或主动引诱
    侵蚀度:
      type: number
      range: 0~100
      check:
        - 主角进行常规导脉净化或深度肉体排毒时显著降低 (-3~-20)
        - 暴露于残脉环境中、受重伤或被脉毒直接污染时上升 (+5~+15)
    身体状况:
      type: enum
      range: [正常, 脉毒微积, 深度侵蚀, 雌堕发情]
      check:
        - 侵蚀度过高时，身体会从 正常 逐渐转为 脉毒微积 或 深度侵蚀（伴随高热、娇喘、肌肤浮现诱人脉纹）
        - 当 情欲值 极高且 好感度 较高，身体完全被排毒带来的快感支配，主动张开双腿渴求触碰时，转为 雌堕发情
        - 侵蚀度和情欲值被完全净化和平复后恢复为 正常
    气味浓度:
      type: enum
      range: [清新, 微汗, 浓郁体香, 甜腻催情]
      check:
        - 随着情欲值飙升、排毒过程中的香汗淋漓、或是腋下及大腿根部摩擦生热，气味会从 清新 迅速转为 微汗、浓郁体香 甚至 甜腻催情
    理智值:
      type: number
      range: 0~100
      check:
        - 随着侵蚀度的折磨或情欲值带来的极致快感而崩塌，理智极低时，行为会完全沦为渴求主角抚摸的本能，毫无羞耻心
    情欲值:
      type: number
      range: 0~100
      check:
        - 被主角的手指或躯体触碰敏感部位（尤其是大腿内侧、肚脐眼、湿润的腋下）时，快感迅速积聚并飙升 (+10~+30)
    当前着装:
      type: string
      check:
        - 详细记录当前衣服的状态和破损程度。例如：“衣衫整洁”、“香肩半露”、“被汗水完全湿透紧贴娇躯”、“下半身裙摆被撩起”、“一丝不挂”。随着互动和排毒过程动态更新。
    身体部位描写:
      type: string
      check:
        - 极度详细地描写当前身体的色气特征与生理反应。重点关注：丰满肉腿的颤抖与泛红、白嫩肚脐周围的汗珠与脉纹、以及微微出汗散发异香的腋窝。例如：“修长肉腿因为快感而不停痉挛，白腻的肚脐眼积聚着催情的汗水，腋下散发着令人疯狂的甜香。”
    腿部敏感度:
      type: number
      range: 0~100
      check:
        - 每次被主角揉捏丰满的肉腿、抚摸大腿内侧、或是在大腿根部进行摩擦排毒时，该部位的敏感度被逐渐开发并永久增加 (+2~+8)
    肚脐敏感度:
      type: number
      range: 0~100
      check:
        - 每次主角的手指探入白嫩的肚脐、在小腹周围画圈刺激、或是将脉能直接灌注进肚脐眼时，敏感度增加 (+2~+8)
    腋下敏感度:
      type: number
      range: 0~100
      check:
        - 每次主角亲吻、舔舐、嗅闻女孩湿润的腋下，或是摩擦腋窝的软肉时，该部位敏感度被深度开发 (+2~+8)
  迦叶:
    <<: *Heroine
  希尔薇:
    <<: *Heroine
